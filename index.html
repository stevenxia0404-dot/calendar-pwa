<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI日程管家 - 时间修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-bottom: 160px; }
        .header { background: rgba(255,255,255,0.95); padding: 20px; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 20px; color: #333; }
        .debug-info { background: #fff3cd; padding: 10px; margin: 10px 15px; border-radius: 8px; font-size: 12px; color: #856404; display: none; }
        .calendar-container { background: white; margin: 15px; border-radius: 20px; padding: 20px; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-title { font-size: 18px; font-weight: 600; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 10px; font-size: 12px; color: #999; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 14px; cursor: pointer; position: relative; }
        .day.active { background: #667eea; color: white; font-weight: 600; }
        .day.has-event::after { content: ''; position: absolute; bottom: 6px; width: 4px; height: 4px; background: #ff6b6b; border-radius: 50%; }
        .input-container { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px 30px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 30px rgba(0,0,0,0.1); }
        .input-wrapper { display: flex; gap: 10px; background: #f8f9fa; padding: 10px; border-radius: 25px; }
        textarea { flex: 1; border: none; background: transparent; font-size: 16px; resize: none; outline: none; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 25px; display: none; z-index: 10000; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 AI日程管家</h1>
        <p style="font-size: 12px; color: #666;">支持"下午3点"识别为15:00</p>
    </div>
    
    <div class="debug-info" id="debugInfo"></div>

    <div class="calendar-container">
        <div class="cal-header">
            <div class="cal-title" id="currentMonth"></div>
            <div>
                <button onclick="changeMonth(-1)" style="padding: 5px 10px; margin-right: 5px;">◀</button>
                <button onclick="changeMonth(1)" style="padding: 5px 10px;">▶</button>
            </div>
        </div>
        <div class="weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
        <div class="days" id="calendarDays"></div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="textInput" rows="1" placeholder="输入：后天下午3点买菜"></textarea>
            <button onclick="handleSubmit()">添加</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 本地日期格式化（防时区Bug）
        function formatLocalDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        let events = JSON.parse(localStorage.getItem('sched_v16') || '[]');
        let currentDate = new Date();
        let selectedDate = new Date();

        function init() {
            renderCalendar();
            document.getElementById('textInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSubmit();
                }
            });
        }

        // ========== 核心：时间解析修复 ==========
        function extractTime(text) {
            // 1. 判断上午/下午/晚上
            let isPM = text.includes('下午') || text.includes('晚上');
            
            // 2. 提取小时和分钟（支持：3点、3:00、15:30、3点30分）
            let hour = 9, minute = 0;
            let matched = false;
            
            // 尝试匹配"3点30分"或"3点"
            let m = text.match(/(\d{1,2})\s*点(?:\s*(\d{1,2})\s*分?)?/);
            if (m) {
                hour = parseInt(m[1]);
                if (m[2]) minute = parseInt(m[2]);
                matched = true;
            } else {
                // 尝试匹配"15:30"
                m = text.match(/(\d{1,2})\s*[:：]\s*(\d{2})/);
                if (m) {
                    hour = parseInt(m[1]);
                    minute = parseInt(m[2]);
                    matched = true;
                    isPM = false; // 24小时制不再加12
                }
            }
            
            // 3. 下午/晚上加12小时（12小时制转换）
            if (isPM && hour < 12) hour += 12;
            
            // 边界检查
            if (hour > 23) hour = 23;
            if (minute > 59) minute = 59;
            
            return {
                str: `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`,
                hour, minute, isPM, matched
            };
        }

        function handleSubmit() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;
            
            // 解析日期
            let date = new Date(selectedDate);
            if (text.includes('今天')) date = new Date();
            else if (text.includes('明天')) { date = new Date(); date.setDate(date.getDate() + 1); }
            else if (text.includes('后天')) { date = new Date(); date.setDate(date.getDate() + 2); }
            
            // 解析时间（新函数）
            const timeObj = extractTime(text);
            
            // 提取标题
            let title = text.replace(/今天|明天|后天|\d{1,2}[号日]|(上午|下午|晚上|早上)?\s*\d{1,2}\s*[点:：]\s*\d{0,2}\s*[分]?/g, '').trim() || '新日程';
            
            // 保存
            const event = {
                id: Date.now(),
                title: title,
                date: formatLocalDate(date),
                time: timeObj.str,
                raw: text
            };
            
            events.push(event);
            localStorage.setItem('sched_v16', JSON.stringify(events));
            renderCalendar();
            
            // 显示调试信息
            const debug = document.getElementById('debugInfo');
            debug.style.display = 'block';
            debug.innerHTML = `<strong>解析：</strong>"${text}" → ${event.date} ${event.time} (下午:${timeObj.isPM})`;
            
            showToast(`已添加：${event.time} ${event.title}`);
            document.getElementById('textInput').value = '';
        }

        function renderCalendar() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '';
            
            // 上月
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="day" style="color:#ccc">${new Date(year, month, 0).getDate() - i}</div>`;
            }
            
            // 当月
            for (let i = 1; i <= daysInMonth; i++) {
                const d = new Date(year, month, i);
                const dateStr = formatLocalDate(d);
                const hasEvent = events.some(e => e.date === dateStr);
                const isActive = formatLocalDate(selectedDate) === dateStr;
                const isToday = formatLocalDate(new Date()) === dateStr;
                
                html += `<div class="day ${isActive ? 'active' : ''} ${hasEvent ? 'has-event' : ''} ${isToday ? 'today' : ''}" onclick="selectDate(${year},${month},${i})">${i}</div>`;
            }
            
            document.getElementById('calendarDays').innerHTML = html;
        }

        function selectDate(year, month, day) {
            selectedDate = new Date(year, month, day);
            renderCalendar();
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        window.onload = init;
    </script>
</body>
</html>

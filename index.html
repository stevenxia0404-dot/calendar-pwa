<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI日程管家 - 时间修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-bottom: 160px; }
        .header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        .header h1 { font-size: 20px; color: #333; font-weight: 600; }
        .today-summary { background: white; margin: 15px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: none; }
        .today-summary.active { display: block; }
        .calendar-container { background: white; margin: 15px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-title { font-size: 18px; font-weight: 600; color: #333; }
        .cal-nav { display: flex; gap: 10px; }
        .cal-nav button { background: #f0f0f0; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 14px; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 10px; font-size: 12px; color: #999; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 14px; cursor: pointer; position: relative; transition: all 0.3s; }
        .day.active { background: #667eea; color: white; font-weight: 600; }
        .day.has-event::after { content: ''; position: absolute; bottom: 6px; width: 4px; height: 4px; background: #ff6b6b; border-radius: 50%; }
        .day.today { border: 2px solid #667eea; color: #667eea; font-weight: 600; }
        .input-container { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px 30px; box-shadow: 0 -5px 30px rgba(0,0,0,0.1); border-radius: 25px 25px 0 0; z-index: 1000; }
        .input-wrapper { display: flex; align-items: flex-end; gap: 10px; background: #f8f9fa; padding: 10px; border-radius: 25px; }
        textarea { flex: 1; border: none; background: transparent; font-size: 16px; resize: none; outline: none; max-height: 100px; font-family: inherit; }
        .btn-send { width: 40px; height: 40px; border-radius: 50%; background: #667eea; border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic-btn { width: 48px; height: 48px; border-radius: 50%; background: #667eea; border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic-btn.recording { background: #ff6b6b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); } 50% { box-shadow: 0 0 0 15px rgba(255,107,107,0); } }
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 25px; font-size: 14px; z-index: 10000; display: none; }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 AI日程管家 <span style="font-size: 12px; color: #999;">v1.5时间修复版</span></h1>
        <p>支持"下午/晚上/早上"识别</p>
    </div>

    <div class="today-summary" id="todaySummary" style="display: none; background: white; margin: 15px; border-radius: 20px; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div id="summaryTitle" style="font-size: 18px; font-weight: 600;">日程概览</div>
            <button onclick="document.getElementById('todaySummary').style.display='none'" style="width: 32px; height: 32px; border-radius: 50%; background: #f5f5f5; border: none;">×</button>
        </div>
        <div id="summaryContent"></div>
    </div>

    <div class="calendar-container">
        <div class="cal-header">
            <div class="cal-title" id="currentMonth">2026年4月</div>
            <div class="cal-nav">
                <button onclick="changeMonth(-1)">◀</button>
                <button onclick="changeMonth(1)">▶</button>
            </div>
        </div>
        <div class="weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
        <div class="days" id="calendarDays"></div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="textInput" rows="1" placeholder="试试：后天下午5点买菜"></textarea>
            <button class="btn-send" onclick="handleTextSubmit()">发送</button>
            <button class="mic-btn" id="micBtn" onmousedown="startRecord()" onmouseup="stopRecord()">🎤</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 核心修复：本地日期格式化
        function formatLocalDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        let isProcessing = false;
        let events = [];
        let currentDate = new Date();
        let selectedDate = new Date();
        let recognition = null;
        let isRecording = false;
        let recordStartTime = 0;
        let tempTranscript = '';

        function init() {
            loadEvents();
            renderCalendar();
            initSpeech();
            setupInput();
        }

        function initSpeech() {
            if (!('webkitSpeechRecognition' in window)) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            recognition.onstart = () => {
                isRecording = true;
                recordStartTime = Date.now();
                tempTranscript = '';
                document.getElementById('micBtn').classList.add('recording');
            };
            
            recognition.onresult = (e) => {
                let interim = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) tempTranscript += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                document.getElementById('textInput').value = tempTranscript + interim;
            };
            
            recognition.onend = () => {
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                if (Date.now() - recordStartTime > 600 && tempTranscript.trim() && !isProcessing) {
                    document.getElementById('textInput').value = '';
                    parseSchedule(tempTranscript.trim());
                }
            };
        }

        function startRecord() {
            if (!recognition || isProcessing) return;
            recognition.start();
        }

        function stopRecord() {
            if (recognition) recognition.stop();
        }

        function setupInput() {
            const textarea = document.getElementById('textInput');
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleTextSubmit();
                }
            });
        }

        function handleTextSubmit() {
            if (isProcessing) return;
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;
            parseSchedule(text);
            document.getElementById('textInput').value = '';
        }

        // ========== 核心修复：时间解析（支持下午/晚上/早上） ==========
        function parseSchedule(text) {
            if (isProcessing) return;
            isProcessing = true;

            setTimeout(() => {
                try {
                    const event = extractEvent(text);
                    if (event) {
                        events.push(event);
                        saveEvents();
                        renderCalendar();
                        showSummary(event.date);
                        showToast(`已添加: ${event.title} ${event.time}`);
                    }
                } catch(e) {
                    console.error(e);
                }
                isProcessing = false;
                tempTranscript = '';
            }, 300);
        }

        function extractEvent(text) {
            let date = new Date(selectedDate);
            let hour = 9, minute = 0;
            let title = text;
            let category = '日程';

            // 1. 日期解析
            if (text.includes('今天')) date = new Date();
            else if (text.includes('明天')) { date = new Date(); date.setDate(date.getDate() + 1); }
            else if (text.includes('后天')) { date = new Date(); date.setDate(date.getDate() + 2); }
            else if (text.includes('下周')) { date = new Date(); date.setDate(date.getDate() + 7); }

            // 2. 时段关键词（下午、晚上、早上、上午）
            let isPM = false;
            let isAM = false;
            
            if (text.includes('下午') || text.includes('晚上')) isPM = true;
            if (text.includes('上午') || text.includes('早上')) isAM = true;

            // 3. 时间数字解析（支持"5点"、"5:00"、"5点30分"等）
            // 匹配模式：数字+点/时，可选的+数字+分，或数字:数字
            let timeMatch = text.match(/(\d{1,2})\s*[点:：时]\s*(\d{1,2})?\s*[分]?/);
            
            if (timeMatch) {
                hour = parseInt(timeMatch[1]);
                minute = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
                
                // 处理12小时制转换
                if (isPM && hour < 12) hour += 12;      // 下午5点 → 17点
                if (isAM && hour === 12) hour = 0;      // 凌晨12点 → 0点（特殊情况）
                
                // 限制范围
                if (hour > 23) hour = 23;
                if (minute > 59) minute = 59;
            }

            // 4. 清理标题（移除时间词）
            title = text.replace(/今天|明天|后天|下周|\d+[号日]|(上午|下午|晚上|早上)?\s*\d{1,2}\s*[点:：时]\s*\d{0,2}\s*[分]?/g, '').trim();
            if (!title) title = '新日程';

            // 5. 分类
            if (text.includes('会')) category = '会议';
            else if (text.includes('买') || text.includes('吃')) category = '生活';

            const timeStr = `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
            
            console.log('解析结果:', text, '→', formatLocalDate(date), timeStr); // 调试用

            return {
                id: Date.now(),
                title: title,
                date: formatLocalDate(date),
                time: timeStr,
                category: category,
                raw: text
            };
        }

        function renderCalendar() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '';
            
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="day" style="color:#ccc">${new Date(year, month, 0).getDate() - i}</div>`;
            }
            
            for (let i = 1; i <= daysInMonth; i++) {
                const d = new Date(year, month, i);
                const dateStr = formatLocalDate(d);
                const hasEvent = events.some(e => e.date === dateStr);
                const isActive = formatLocalDate(selectedDate) === dateStr;
                const isToday = formatLocalDate(new Date()) === dateStr;
                
                html += `<div class="day ${isActive ? 'active' : ''} ${hasEvent ? 'has-event' : ''} ${isToday ? 'today' : ''}" onclick="selectDate(${year}, ${month}, ${i})">${i}</div>`;
            }
            
            document.getElementById('calendarDays').innerHTML = html;
        }

        function selectDate(year, month, day) {
            selectedDate = new Date(year, month, day);
            renderCalendar();
            showSummary(formatLocalDate(selectedDate));
        }

        function showSummary(dateStr) {
            const dayEvents = events.filter(e => e.date === dateStr).sort((a, b) => a.time.localeCompare(b.time));
            const summary = document.getElementById('todaySummary');
            const content = document.getElementById('summaryContent');
            
            document.getElementById('summaryTitle').textContent = dateStr + ' 日程';
            
            if (dayEvents.length === 0) {
                content.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">无日程</div>';
            } else {
                content.innerHTML = dayEvents.map(e => `
                    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;">
                        <div style="background:#667eea;color:white;padding:6px 10px;border-radius:8px;">${e.time}</div>
                        <div>${e.title}</div>
                    </div>
                `).join('');
            }
            summary.style.display = 'block';
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function saveEvents() {
            localStorage.setItem('schedule_v15', JSON.stringify(events));
        }

        function loadEvents() {
            const saved = localStorage.getItem('schedule_v15');
            if (saved) events = JSON.parse(saved);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        window.onload = init;
    </script>
</body>
</html>

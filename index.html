<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI日程管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-bottom: 180px; }
        .header { background: rgba(255,255,255,0.95); padding: 15px 20px; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 20px; color: #333; }
        .debug-info { background: #fff3cd; padding: 8px 15px; margin: 10px 15px; border-radius: 8px; font-size: 12px; color: #856404; display: none; }
        .calendar-container { background: white; margin: 15px; border-radius: 20px; padding: 20px; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-title { font-size: 18px; font-weight: 600; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 10px; font-size: 12px; color: #999; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 14px; cursor: pointer; position: relative; }
        .day.active { background: #667eea; color: white; font-weight: 600; }
        .day.has-event::after { content: ''; position: absolute; bottom: 6px; width: 4px; height: 4px; background: #ff6b6b; border-radius: 50%; }
        .day.today { border: 2px solid #667eea; color: #667eea; }
        .detail-card { background: white; margin: 15px; border-radius: 15px; padding: 15px; display: none; }
        .detail-card.show { display: block; }
        .input-container { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px 30px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 30px rgba(0,0,0,0.1); }
        .input-wrapper { display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 10px; border-radius: 25px; }
        textarea { flex: 1; border: none; background: transparent; font-size: 16px; resize: none; outline: none; max-height: 80px; }
        .mic-btn { width: 44px; height: 44px; border-radius: 50%; background: #667eea; border: none; color: white; font-size: 20px; cursor: pointer; }
        .mic-btn.recording { background: #ff4d4f; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,79,0.4); } 50% { box-shadow: 0 0 0 10px rgba(255,77,79,0); } }
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 25px; display: none; z-index: 10000; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 AI日程管家</h1>
        <p style="font-size: 12px; color: #666;">长按🎤语音输入</p>
    </div>
    
    <div class="debug-info" id="debugInfo"></div>

    <div class="calendar-container">
        <div class="cal-header">
            <div class="cal-title" id="currentMonth"></div>
            <div>
                <button onclick="changeMonth(-1)" style="padding: 5px 10px; background: #f0f0f0; border: none; border-radius: 5px; margin-right: 5px;">◀</button>
                <button onclick="changeMonth(1)" style="padding: 5px 10px; background: #f0f0f0; border: none; border-radius: 5px;">▶</button>
            </div>
        </div>
        <div class="weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
        <div class="days" id="calendarDays"></div>
    </div>

    <div class="detail-card" id="detailCard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <strong id="detailDate">日程详情</strong>
            <button onclick="document.getElementById('detailCard').classList.remove('show')" style="background: none; border: none; font-size: 20px; cursor: pointer;">×</button>
        </div>
        <div id="detailContent"></div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="textInput" rows="1" placeholder="输入或语音：后天下午3点买菜"></textarea>
            <button class="mic-btn" id="micBtn" onmousedown="startRecord()" onmouseup="stopRecord()" ontouchstart="startRecord()" ontouchend="stopRecord()">🎤</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 本地日期格式化
        function formatLocalDate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // 提取时间（修复下午3点→15:00）
        function extractTime(text) {
            let isPM = text.includes('下午') || text.includes('晚上');
            let hour = 9, minute = 0;
            let matched = false;
            
            let m = text.match(/(\d{1,2})\s*点(?:\s*(\d{1,2})\s*分?)?/);
            if (m) {
                hour = parseInt(m[1]);
                if (m[2]) minute = parseInt(m[2]);
                matched = true;
            } else {
                m = text.match(/(\d{1,2})\s*[:：]\s*(\d{2})/);
                if (m) { hour = parseInt(m[1]); minute = parseInt(m[2]); matched = true; isPM = false; }
            }
            
            if (matched && isPM && hour < 12) hour += 12;
            if (hour > 23) hour = 23;
            if (minute > 59) minute = 59;
            
            return { str: `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`, hour, minute, isPM, matched };
        }

        let events = JSON.parse(localStorage.getItem('sched_v17') || '[]');
        let currentDate = new Date();
        let selectedDate = new Date();
        let recognition = null;
        let isRecording = false;
        let recordStartTime = 0;
        let tempTranscript = '';
        let isProcessing = false;

        function init() {
            renderCalendar();
            initSpeech();
            document.getElementById('textInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
            });
        }

        function initSpeech() {
            if (!('webkitSpeechRecognition' in window)) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            recognition.onstart = () => {
                isRecording = true;
                recordStartTime = Date.now();
                tempTranscript = '';
                document.getElementById('micBtn').classList.add('recording');
            };
            
            recognition.onresult = (e) => {
                let interim = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) tempTranscript += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                document.getElementById('textInput').value = tempTranscript + interim;
            };
            
            recognition.onend = () => {
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                if (Date.now() - recordStartTime > 600 && tempTranscript.trim() && !isProcessing) {
                    document.getElementById('textInput').value = '';
                    handleSubmit(tempTranscript.trim());
                }
            };
        }

        function startRecord() {
            if (!recognition || isProcessing) return;
            recognition.start();
        }

        function stopRecord() {
            if (recognition) recognition.stop();
        }

        function handleSubmit(inputText) {
            if (isProcessing) return;
            const text = inputText || document.getElementById('textInput').value.trim();
            if (!text) return;
            if (!inputText && text === tempTranscript) return;
            
            isProcessing = true;
            
            // 解析日期
            let date = new Date(selectedDate);
            if (text.includes('今天')) date = new Date();
            else if (text.includes('明天')) { date = new Date(); date.setDate(date.getDate() + 1); }
            else if (text.includes('后天')) { date = new Date(); date.setDate(date.getDate() + 2); }
            
            // 解析时间
            const timeObj = extractTime(text);
            
            // 提取标题
            let title = text.replace(/今天|明天|后天|下周|\d{1,2}[号日]|(上午|下午|晚上|早上)?\s*\d{1,2}\s*[点:：]\s*\d{0,2}\s*[分]?/g, '').trim() || '新日程';
            
            const event = {
                id: Date.now(),
                title: title,
                date: formatLocalDate(date),
                time: timeObj.str,
                raw: text
            };
            
            events.push(event);
            localStorage.setItem('sched_v17', JSON.stringify(events));
            renderCalendar();
            showDetail(formatLocalDate(date));
            
            // 显示调试
            document.getElementById('debugInfo').style.display = 'block';
            document.getElementById('debugInfo').textContent = `解析："${text}" → ${event.date} ${event.time}`;
            
            showToast(`已添加：${event.time} ${event.title}`);
            if (!inputText) document.getElementById('textInput').value = '';
            tempTranscript = '';
            isProcessing = false;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '';
            
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="day" style="color:#ccc">${new Date(year, month, 0).getDate() - i}</div>`;
            }
            
            const today = new Date();
            for (let i = 1; i <= daysInMonth; i++) {
                const d = new Date(year, month, i);
                const dateStr = formatLocalDate(d);
                const hasEvent = events.some(e => e.date === dateStr);
                const isActive = formatLocalDate(selectedDate) === dateStr;
                const isToday = formatLocalDate(today) === dateStr;
                
                html += `<div class="day ${isActive ? 'active' : ''} ${hasEvent ? 'has-event' : ''} ${isToday ? 'today' : ''}" onclick="selectDate('${dateStr}')">${i}</div>`;
            }
            
            document.getElementById('calendarDays').innerHTML = html;
        }

        function selectDate(dateStr) {
            selectedDate = new Date(dateStr);
            renderCalendar();
            showDetail(dateStr);
        }

        function showDetail(dateStr) {
            const dayEvents = events.filter(e => e.date === dateStr).sort((a, b) => a.time.localeCompare(b.time));
            document.getElementById('detailDate').textContent = dateStr + ' 日程';
            
            let content = '';
            if (dayEvents.length === 0) {
                content = '<div style="color:#999; padding: 20px 0; text-align: center;">当日无日程</div>';
            } else {
                content = dayEvents.map(e => `
                    <div style="display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0;">
                        <div style="background: #667eea; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px;">${e.time}</div>
                        <div>
                            <div style="font-weight: 600;">${e.title}</div>
                            <div style="font-size: 12px; color: #999;">${e.raw}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            document.getElementById('detailContent').innerHTML = content;
            document.getElementById('detailCard').classList.add('show');
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
